services:
  mongodb:
    build:
      context: .
      dockerfile: Dockerfile.mongo
    container_name: translogix_db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: translogix2026
      MONGO_INITDB_DATABASE: translogix_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - translogix_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: translogix_api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://admin:translogix2026@mongodb:27017/translogix_db?authSource=admin
      JWT_SECRET: translogix_demo_secret_2026
      JWT_EXPIRES_IN: 8h
    ports:
      - "3000:3000"
    networks:
      - translogix_net

  mongo-express:
    image: mongo-express:1.0.2
    container_name: translogix_mongo_express
    restart: on-failure
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: translogix2026
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    networks:
      - translogix_net

volumes:
  mongo_data:
    driver: local

networks:
  translogix_net:
    driver: bridge
